<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEOSTYLE SHOP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
box-shadow:0 0 25px #00ffff;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:32px;
font-weight:bold;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

.cart-btn{
cursor:pointer;
font-size:22px;
}

.hero{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:60px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px cyan; }
to{ text-shadow:0 0 40px cyan; }
}

.search{
width:90%;
max-width:500px;
padding:15px;
margin:30px auto;
display:block;
border:none;
border-radius:20px;
font-size:18px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#161616;
border-radius:20px;
overflow:hidden;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px cyan;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:cyan;
font-size:22px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
background:cyan;
font-weight:bold;
cursor:pointer;
}

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
transition:.5s;
padding:20px;
overflow:auto;
box-shadow:-5px 0 20px cyan;
}

.cart.active{
right:0;
}

.total{
font-size:25px;
margin-top:20px;
color:cyan;
}
</style>
</head>
<body>

<header>
<div class="logo">NEOSTYLE</div>
<div class="cart-btn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>
</header>

<section class="hero">
<h1>НОВА КОЛЕКЦІЯ</h1>
<p>Стиль майбутнього</p>
</section>

<input
type="text"
class="search"
placeholder="Пошук товару..."
onkeyup="searchProducts()"
id="search"
/>

<div class="products" id="products"></div>

<div class="cart" id="cart">
<h2>Кошик</h2>
<div id="cartItems"></div>
<div class="total" id="total">0 грн</div>
</div>

<script>

const products=[
{
name:"Худі Black",
price:1200,
img:"https://picsum.photos/400/400?1"
},
{
name:"Футболка Premium",
price:700,
img:"https://picsum.photos/400/400?2"
},
{
name:"Кросівки Neo",
price:2500,
img:"https://picsum.photos/400/400?3"
},
{
name:"Куртка Urban",
price:3200,
img:"https://picsum.photos/400/400?4"
},
{
name:"Штани Cargo",
price:1800,
img:"https://picsum.photos/400/400?5"
}
];

let cart=[];

function renderProducts(list){

const container=document.getElementById("products");

container.innerHTML="";

list.forEach(product=>{

container.innerHTML+=`
<div class="card">
<img src="${product.img}">
<div class="info">
<h3>${product.name}</h3>
<div class="price">${product.price} грн</div>
<button onclick="addToCart('${product.name}',${product.price})">
Купити
</button>
</div>
</div>
`;

});

}

function addToCart(name,price){

cart.push({name,price});

updateCart();

}

function updateCart(){

const items=document.getElementById("cartItems");

items.innerHTML="";

let total=0;

cart.forEach(item=>{

total+=item.price;

items.innerHTML+=`
<p>${item.name} - ${item.price} грн</p>
`;

});

document.getElementById("total").innerText=
"Разом: "+total+" грн";

document.getElementById("count").innerText=
cart.length;

}

function toggleCart(){

document.getElementById("cart")
.classList.toggle("active");

}

function searchProducts(){

const value=
document.getElementById("search")
.value.toLowerCase();

const filtered=
products.filter(p=>
p.name.toLowerCase().includes(value)
);

renderProducts(filtered);

}

renderProducts(products);

</script>

</body>
</html>
